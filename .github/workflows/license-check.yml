name: License Check

# Fails a pull request that introduces a dependency whose license falls
# outside the project's allowed set. The allow-list below is kept in sync
# with CONTRIBUTING.md → Dependencies. This checks the PR's dependency diff
# only — it does not re-audit the existing tree.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency license review
        uses: actions/dependency-review-action@v4
        with:
          # Permissive licenses + weak copyleft (LGPL / MPL). Mirrors the
          # allowed set in CONTRIBUTING.md → Dependencies. A dependency under
          # any license not listed here fails the check.
          allow-licenses: >-
            MIT, ISC, 0BSD, BSD-2-Clause, BSD-3-Clause, Apache-2.0,
            Unlicense, CC0-1.0, MPL-2.0,
            LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later
          # Also block a PR that drags in a high/critical-severity vuln.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
